<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Similarity Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --surface2: #1e1e2e;
    --border: #2a2a3e;
    --text: #e0e0e8;
    --text-dim: #888899;
    --accent: #fa2d48;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 100;
    flex-wrap: wrap;
  }

  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  header h1 span { color: var(--accent); }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .slider-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .slider-group label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .slider-group input[type="range"] {
    width: 100px;
    accent-color: var(--accent);
  }

  .slider-group .val {
    font-size: 12px;
    color: var(--text);
    min-width: 30px;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toggle-group label {
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
  }

  .toggle-group input[type="checkbox"] {
    accent-color: var(--accent);
  }

  .search-wrap {
    position: relative;
  }

  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    color: var(--text);
    font-size: 12px;
    width: 180px;
    outline: none;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }

  .search-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 200px;
    overflow-y: auto;
    z-index: 300;
    display: none;
  }

  .search-dropdown.visible { display: block; }

  .search-item {
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
  }

  .search-item:hover, .search-item.active {
    background: var(--border);
  }

  .search-item .match-hl {
    color: var(--accent);
    font-weight: 600;
  }

  .search-item .search-meta {
    color: var(--text-dim);
    font-size: 10px;
    margin-left: 6px;
  }

  .stats {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;
  }

  #chart {
    width: 100%;
    height: calc(100vh - 52px);
    position: relative;
  }

  /* Legend sidebar */
  #legend {
    position: absolute;
    top: 60px;
    right: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    z-index: 50;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
    min-width: 140px;
  }

  #legend h3 {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 4px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }

  .legend-item:hover { background: var(--surface2); }
  .legend-item.active { background: var(--surface2); }
  .legend-item.dimmed { opacity: 0.3; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-count {
    color: var(--text-dim);
    font-size: 10px;
    margin-left: auto;
    padding-left: 8px;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    pointer-events: none;
    z-index: 200;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    font-size: 13px;
    display: none;
  }

  .tooltip.visible { display: block; }

  .tooltip .tt-name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .tooltip .tt-genres {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 8px;
  }

  .tooltip .tt-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
    font-size: 12px;
  }

  .tooltip .tt-label { color: var(--text-dim); }
  .tooltip .tt-val { text-align: right; font-weight: 600; }

  .tooltip .tt-sparkline {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 24px;
    margin-top: 8px;
  }

  .tooltip .tt-sparkline .bar {
    flex: 1;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    min-height: 1px;
  }

  .tooltip .tt-sparkline-labels {
    display: flex;
    gap: 2px;
    font-size: 8px;
    color: var(--text-dim);
  }

  .tooltip .tt-sparkline-labels span { flex: 1; text-align: center; }

  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }

  .badge-tracked { background: rgba(52,211,153,0.2); color: #34d399; }
  .badge-discovered { background: rgba(147,130,255,0.2); color: #9382ff; }

  .tt-discovered-info {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1><span>Similarity</span> Graph</h1>
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search artists..." autocomplete="off">
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <div class="slider-group">
      <label>Min plays:</label>
      <input type="range" id="minPlays" min="50" max="500" value="50" step="10">
      <span class="val" id="minPlaysVal">50</span>
    </div>
    <div class="toggle-group">
      <input type="checkbox" id="showDiscovered">
      <label for="showDiscovered">Show discovered</label>
    </div>
    <div class="toggle-group">
      <input type="checkbox" id="showTagEdges" checked>
      <label for="showTagEdges">Genre edges</label>
    </div>
    <div class="toggle-group">
      <input type="checkbox" id="showListenerEdges" checked>
      <label for="showListenerEdges">Listener edges</label>
    </div>
    <div class="toggle-group">
      <input type="checkbox" id="showForgotten">
      <label for="showForgotten">Highlight forgotten</label>
    </div>
  </div>
  <div class="stats" id="stats"></div>
</header>

<div id="chart">
  <div id="legend"></div>
</div>

<div class="tooltip" id="tooltip"></div>

const hasPreStreaming = GRAPH.nodes.some(n => n.byYear && Object.keys(n.byYear).some(y => y < "2018"));

const COMMUNITY_COLORS = [

// An artist is "forgotten" if they haven't been played in over a year
// (or have no play date at all, meaning they fell off long ago)
function isForgotten(d) {
  if (d.isDiscovered) return false;
  const cutoff = new Date();
  cutoff.setFullYear(cutoff.getFullYear() - 1);
  if (!d.lastPlayed) return true;
  return new Date(d.lastPlayed) < cutoff;
}

// State
let minPlays = 50;
let showDiscovered = false;
let showForgotten = false;
let showTagEdges = true;
let showListenerEdges = true;
let activeCommunity = null;
let pinnedNodes = new Set();
let highlightedNode = null;
let searchTerm = "";

// Build filtered data
function getFilteredData() {
  const nodeVisible = GRAPH.nodes.map(n => {
    if (n.isDiscovered && !showDiscovered) return false;
    if (!n.isDiscovered && n.plays < minPlays) return false;
    if (activeCommunity !== null && n.community !== activeCommunity) return false;
    return true;
  });

  const idxMap = {};
  const nodes = [];
  GRAPH.nodes.forEach((n, i) => {
    if (!nodeVisible[i]) return;
    idxMap[i] = nodes.length;
    nodes.push({...n, origIdx: i});
  });

  const edges = [];
  GRAPH.edges.forEach(e => {
    if (idxMap[e.source] !== undefined && idxMap[e.target] !== undefined) {
      if (e.type === "tag" && !showTagEdges) return;
      if (e.type === "listener" && !showListenerEdges) return;
      edges.push({source: idxMap[e.source], target: idxMap[e.target], weight: e.weight, type: e.type});
    }
  });

  return {nodes, edges};
}

// Community stats
function getCommunityStats() {
  const stats = {};
  GRAPH.nodes.forEach(n => {
    if (n.isDiscovered) return;
    const c = n.community;
    if (!stats[c]) stats[c] = {count: 0, topArtist: null, topWeight: 0};
    stats[c].count++;
    if (n.weight > stats[c].topWeight) {
      stats[c].topWeight = n.weight;
      stats[c].topArtist = n.name;
    }
  });
  return stats;
}

    }
  } else {
    html += `<div class="tt-discovered-info">Referenced by ${n.refCount} of your artists (best match: ${(n.maxMatch * 100).toFixed(0)}%)</div>`;
  }

  tooltip.html(html).classed("visible", true);
  positionTooltip(event);
}

function positionTooltip(event) {
  const tt = tooltip.node();
  const ttW = tt.offsetWidth || 280;
  const ttH = tt.offsetHeight || 200;
  const gap = 20;
  const cx = event.clientX, cy = event.clientY;
  // Prefer upper-right, then try other quadrants to avoid covering the node
  const candidates = [
    {x: cx + gap, y: cy - ttH - gap},       // upper-right
    {x: cx - ttW - gap, y: cy - ttH - gap},  // upper-left
    {x: cx + gap, y: cy + gap},              // lower-right
    {x: cx - ttW - gap, y: cy + gap},         // lower-left
  ];
  // Pick first candidate that fits on screen
  let best = candidates[0];
  for (const c of candidates) {
    if (c.x >= 5 && c.x + ttW <= window.innerWidth - 5 &&
        c.y >= 5 && c.y + ttH <= window.innerHeight - 5) {
      best = c; break;
    }
  }
  tooltip.style("left", Math.max(5, best.x) + "px")
         .style("top", Math.max(5, best.y) + "px");
}

function hideTooltip() {
  tooltip.classed("visible", false);
}

// Main visualization
const svg = d3.select("#chart").append("svg")
  .attr("width", "100%")
  .attr("height", "100%");

const g = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.1, 10])
  .on("zoom", (e) => {
    g.attr("transform", e.transform);
    updateLabelVisibility(e.transform.k);
  });

svg.call(zoom);

// Click background to dismiss tooltip
svg.on("click", () => hideTooltip());

let simulation, linkSel, nodeSel, labelSel;
let currentTransformK = 1;

function updateLabelVisibility(k) {
  currentTransformK = k;
  if (!labelSel) return;
  labelSel.attr("display", (d, i) => {
    if (highlightedNode && (d.origIdx === highlightedNode || neighborSet.has(d.origIdx))) return "block";
    if (showForgotten && isForgotten(d)) return "block";
    if (k >= 3) return "block";
    if (k >= 1.5) return d.weight >= weightThresholds.top100 ? "block" : "none";
    return d.weight >= weightThresholds.top50 ? "block" : "none";
  });
}

let weightThresholds = {top50: 0, top100: 0};
let neighborSet = new Set();

function render() {
  const data = getFilteredData();
  const listenerCount = data.edges.filter(e => e.type === "listener").length;
  const tagCount = data.edges.filter(e => e.type === "tag").length;
  d3.select("#stats").text(`${data.nodes.filter(n=>!n.isDiscovered).length} artists, ${listenerCount} listener + ${tagCount} genre = ${data.edges.length} connections`);

  // Weight thresholds for label visibility
  const weights = data.nodes.filter(n => !n.isDiscovered).map(n => n.weight).sort((a,b) => b - a);
  weightThresholds.top50 = weights[Math.min(49, weights.length - 1)] || 0;
  weightThresholds.top100 = weights[Math.min(99, weights.length - 1)] || 0;

  // Max weight for sizing
  const maxWeight = d3.max(data.nodes, n => n.weight) || 1;
  const rScale = d3.scaleSqrt().domain([0, maxWeight]).range([3, 24]);

  // Stop old simulation
  if (simulation) simulation.stop();

  g.selectAll("*").remove();

  if (data.nodes.length === 0) return;

  // Links
  linkSel = g.append("g").attr("class", "links").selectAll("line")
    .data(data.edges).enter().append("line")
    .attr("stroke", d => d.type === "tag" ? "#fbbf24" : "#ffffff")
    .attr("stroke-opacity", d => d.type === "tag" ? d.weight * 0.15 : d.weight * 0.12)
    .attr("stroke-width", d => d.weight * 1.5)
    .attr("stroke-dasharray", d => d.type === "tag" ? "4,3" : "none");

  // Node groups
  const nodeG = g.append("g").attr("class", "nodes").selectAll("g")
    .data(data.nodes).enter().append("g")
    .attr("cursor", "pointer");

  // Circles
  nodeSel = nodeG.append("circle")
    .attr("r", d => d.isDiscovered ? 4 : rScale(d.weight))
    .attr("fill", d => d.isDiscovered ? "transparent" : communityColor(d.community))
    .attr("stroke", d => {
      if (d.isTracked) return "#34d399";
      if (d.isDiscovered) return communityColor(d.community);
      return "none";
    })
    .attr("stroke-width", d => {
      if (d.isTracked) return 2.5;
      if (d.isDiscovered) return 1.5;
      return 0;
    })
    .attr("opacity", d => {
      if (showForgotten && !d.isDiscovered) {
        return isForgotten(d) ? 1 : 0.4;
      }
      return d.isDiscovered ? 0.6 : 1;
    });

  // Forgotten highlight ring
  if (showForgotten) {
    nodeG.filter(d => !d.isDiscovered && isForgotten(d))
      .append("circle")
      .attr("r", d => rScale(d.weight) + 4)
      .attr("fill", "none")
      .attr("stroke", "#fbbf24")
      .attr("stroke-width", 1.5)
      .attr("stroke-dasharray", "3,2")
      .attr("opacity", 0.7);
  }

  // Labels
  labelSel = nodeG.append("text")
    .text(d => d.name)
    .attr("font-size", d => d.isDiscovered ? 8 : Math.max(9, Math.min(13, 8 + rScale(d.weight) / 4)))
    .attr("fill", d => d.isDiscovered ? "#9382ff" : "#e0e0e8")
    .attr("dx", d => (d.isDiscovered ? 6 : rScale(d.weight) + 4))
    .attr("dy", 3)
    .attr("font-weight", d => d.weight > weightThresholds.top50 ? 600 : 400)
    .attr("display", "none");

  updateLabelVisibility(currentTransformK);

  // Build adjacency for hover
  const adj = {};
  data.edges.forEach(e => {
    const s = typeof e.source === "object" ? e.source.index : e.source;
    const t = typeof e.target === "object" ? e.target.index : e.target;
    if (!adj[s]) adj[s] = [];
    if (!adj[t]) adj[t] = [];
    adj[s].push(t);
    adj[t].push(s);
  });

  // Interactions
  nodeG.on("mouseover", function(event, d) {
    highlightedNode = d.origIdx;
    const idx = data.nodes.indexOf(d);
    const nbs = adj[idx] || [];
    neighborSet = new Set(nbs.map(i => data.nodes[i].origIdx));

    nodeSel.attr("opacity", (n, i) => (i === idx || nbs.includes(i)) ? 1 : 0.08);
    linkSel.attr("stroke-opacity", e => {
      const s = typeof e.source === "object" ? e.source.index : e.source;
      const t = typeof e.target === "object" ? e.target.index : e.target;
      return (s === idx || t === idx) ? Math.max(e.weight * 0.5, 0.2) : 0.02;
    }).attr("stroke-width", e => {
      const s = typeof e.source === "object" ? e.source.index : e.source;
      const t = typeof e.target === "object" ? e.target.index : e.target;
      return (s === idx || t === idx) ? e.weight * 3 : e.weight * 1.5;
    });
    labelSel.attr("display", (n, i) => (i === idx || nbs.includes(i)) ? "block" : "none");

  })
  .on("mouseout", function() {
    highlightedNode = null;
    neighborSet.clear();
    nodeSel.attr("opacity", d => {
      if (showForgotten && !d.isDiscovered) {
        return isForgotten(d) ? 1 : 0.4;
      }
      return d.isDiscovered ? 0.6 : 1;
    });
    linkSel.attr("stroke-opacity", d => d.weight * 0.12).attr("stroke-width", d => d.weight * 1.5);
    updateLabelVisibility(currentTransformK);
    hideTooltip();
  });

  // Drag for pinning — requires deliberate movement
  const drag = d3.drag()
    .clickDistance(10)
    .on("start", () => {})
    .on("drag", (event, d) => {
      // First real drag event means we crossed clickDistance — start pinning
      if (d.fx == null) {
        simulation.alphaTarget(0.3).restart();
      }
      d.fx = event.x; d.fy = event.y;
    })
    .on("end", (event, d) => {
      if (d.fx == null) return; // Was just a click, no drag happened
      if (!event.active) simulation.alphaTarget(0);
      pinnedNodes.add(d.origIdx);
      d3.select(event.sourceEvent.target.parentNode)
        .selectAll(".pin-dot").remove();
      d3.select(event.sourceEvent.target.parentNode)
        .append("circle").attr("class", "pin-dot")
        .attr("r", 2.5).attr("cx", 0)
        .attr("cy", d => -(d.isDiscovered ? 6 : rScale(d.weight)) - 3)
        .attr("fill", "#fbbf24");
    });

  nodeG.call(drag);

  // Click to show tooltip (only fires if drag didn't start, thanks to clickDistance)
  nodeG.on("click", (event, d) => {
    event.stopPropagation();
    showTooltip(d, event);
  });

  // Double-click to unpin
  nodeG.on("dblclick", (event, d) => {
    event.stopPropagation();
    d.fx = null; d.fy = null;
    pinnedNodes.delete(d.origIdx);
    d3.select(event.currentTarget).selectAll(".pin-dot").remove();
    simulation.alphaTarget(0.1).restart();
    setTimeout(() => simulation.alphaTarget(0), 500);
  });

  // Simulation
  const w = svg.node().clientWidth;
  const h = svg.node().clientHeight;

  simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.edges).id((d, i) => i)
      .distance(d => d.type === "tag" ? 100 : 60 + 40 * (1 - d.weight))
      .strength(d => d.type === "tag" ? 0.05 : d.weight * 0.3))
    .force("charge", d3.forceManyBody().strength(d => d.isDiscovered ? -20 : -50 - rScale(d.weight) * 2))
    .force("center", d3.forceCenter(w / 2, h / 2).strength(0.03))
    .force("radial", d3.forceRadial(Math.min(w, h) * 0.35, w / 2, h / 2).strength(0.02))
    .force("collision", d3.forceCollide().radius(d => (d.isDiscovered ? 5 : rScale(d.weight)) + 3))
    .on("tick", () => {
      linkSel
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeG.attr("transform", d => `translate(${d.x},${d.y})`);
    });
}

// Legend
function renderLegend() {
  const stats = getCommunityStats();
  const legend = d3.select("#legend");
  legend.html(`<h3>Communities</h3>`);

  Object.entries(stats)
    .sort((a, b) => b[1].count - a[1].count)
    .forEach(([c, s]) => {
      const ci = parseInt(c);
      const item = legend.append("div")
        .attr("class", "legend-item" + (activeCommunity === ci ? " active" : ""))
        .on("click", () => {
          activeCommunity = activeCommunity === ci ? null : ci;
          renderLegend();
          render();
        });

      item.append("div").attr("class", "legend-dot")
        .style("background", communityColor(ci));
      item.append("span").text(s.topArtist);
      item.append("span").attr("class", "legend-count").text(s.count);

      if (activeCommunity !== null && activeCommunity !== ci) {
        item.classed("dimmed", true);
      }
    });
}

// Controls
d3.select("#minPlays").on("input", function() {
  minPlays = +this.value;
  d3.select("#minPlaysVal").text(minPlays);
  render();
});

d3.select("#showDiscovered").on("change", function() {
  showDiscovered = this.checked;
  render();
});

d3.select("#showTagEdges").on("change", function() {
  showTagEdges = this.checked;
  render();
});

d3.select("#showListenerEdges").on("change", function() {
  showListenerEdges = this.checked;
  render();
});

d3.select("#showForgotten").on("change", function() {
  showForgotten = this.checked;
  render();
});

const searchInput = d3.select("#search");
const dropdown = d3.select("#searchDropdown");
let activeDropdownIdx = -1;

function zoomToArtist(name) {
  const simNodes = simulation ? simulation.nodes() : [];
  const rendered = simNodes.find(n => n.name === name);
  if (!rendered || rendered.x === undefined) return;

  const w = svg.node().clientWidth;
  const h = svg.node().clientHeight;
  const scale = 2;
  const transform = d3.zoomIdentity
    .translate(w/2 - rendered.x * scale, h/2 - rendered.y * scale)
    .scale(scale);
  svg.transition().duration(750).call(zoom.transform, transform);

  nodeSel.filter((d) => d.origIdx === rendered.origIdx)
    .transition().duration(200).attr("stroke", "#fff").attr("stroke-width", 4)
    .transition().duration(1000).attr("stroke", d => d.isTracked ? "#34d399" : d.isDiscovered ? communityColor(d.community) : "none")
    .attr("stroke-width", d => d.isTracked ? 2.5 : d.isDiscovered ? 1.5 : 0);

  dropdown.classed("visible", false);
  searchInput.node().blur();
}

function updateDropdown(term) {
  if (!term) { dropdown.classed("visible", false); return; }
  const matches = GRAPH.nodes
    .filter(n => n.name.toLowerCase().includes(term))
    .sort((a, b) => {
      // Exact start match first, then by plays
      const aStarts = a.name.toLowerCase().startsWith(term) ? 1 : 0;
      const bStarts = b.name.toLowerCase().startsWith(term) ? 1 : 0;
      if (bStarts !== aStarts) return bStarts - aStarts;
      return b.plays - a.plays;
    })
    .slice(0, 8);

  if (matches.length === 0) { dropdown.classed("visible", false); return; }

  dropdown.html("");
  matches.forEach((m, i) => {
    const idx = m.name.toLowerCase().indexOf(term);
    const before = m.name.slice(0, idx);
    const hl = m.name.slice(idx, idx + term.length);
    const after = m.name.slice(idx + term.length);
    const meta = m.isDiscovered ? "discovered" : `${m.plays} plays`;

    const item = dropdown.append("div")
      .attr("class", "search-item" + (i === activeDropdownIdx ? " active" : ""))
      .html(`${before}<span class="match-hl">${hl}</span>${after}<span class="search-meta">${meta}</span>`)
      .on("mousedown", (event) => {
        event.preventDefault();
        searchInput.node().value = m.name;
        zoomToArtist(m.name);
      });
  });
  dropdown.classed("visible", true);
  activeDropdownIdx = -1;
}

searchInput.on("input", function() {
  searchTerm = this.value.trim().toLowerCase();
  updateDropdown(searchTerm);
});

searchInput.on("keydown", function(event) {
  const items = dropdown.selectAll(".search-item");
  const count = items.size();
  if (!count) {
    if (event.key === "Enter") {
      // Direct search fallback
      searchTerm = this.value.trim().toLowerCase();
      if (!searchTerm) return;
      const match = GRAPH.nodes.find(n => n.name.toLowerCase().includes(searchTerm));
      if (match) zoomToArtist(match.name);
    }
    return;
  }

  if (event.key === "ArrowDown") {
    event.preventDefault();
    activeDropdownIdx = Math.min(activeDropdownIdx + 1, count - 1);
    items.classed("active", (d, i) => i === activeDropdownIdx);
  } else if (event.key === "ArrowUp") {
    event.preventDefault();
    activeDropdownIdx = Math.max(activeDropdownIdx - 1, 0);
    items.classed("active", (d, i) => i === activeDropdownIdx);
  } else if (event.key === "Enter") {
    event.preventDefault();
    if (activeDropdownIdx >= 0) {
      const selected = GRAPH.nodes
        .filter(n => n.name.toLowerCase().includes(searchTerm))
        .sort((a, b) => {
          const aStarts = a.name.toLowerCase().startsWith(searchTerm) ? 1 : 0;
          const bStarts = b.name.toLowerCase().startsWith(searchTerm) ? 1 : 0;
          if (bStarts !== aStarts) return bStarts - aStarts;
          return b.plays - a.plays;
        })[activeDropdownIdx];
      if (selected) {
        this.value = selected.name;
        zoomToArtist(selected.name);
      }
    } else {
      const match = GRAPH.nodes.find(n => n.name.toLowerCase().includes(searchTerm));
      if (match) {
        this.value = match.name;
        zoomToArtist(match.name);
      }
    }
  } else if (event.key === "Escape") {
    dropdown.classed("visible", false);
    activeDropdownIdx = -1;
  }
});

searchInput.on("blur", function() {
  // Small delay so mousedown on dropdown items fires first
  setTimeout(() => dropdown.classed("visible", false), 150);
});

// Init
renderLegend();
render();
</script>
</body>
</html>
